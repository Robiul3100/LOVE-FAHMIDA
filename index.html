*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Black galaxy background (nebula slowly shift kore) ──── */
.galaxy {

  animation: galaxyShift 26s ease-in-out infinite alternate;
}
@keyframes galaxyShift {
  0%   { filter: hue-rotate(0deg);  transform: scale(1);    }
  100% { filter: hue-rotate(28deg); transform: scale(1.08); }
}

/* ── Mitimiti tara (twinkling stars) ─────────────────────── */

  15%  { opacity: 0.8; }

@keyframes petalFall {
  0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.9; }

.modal-close {

/* ── Mitimiti tara canvas ────────────────────────────────── */
(function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 150; i++) {
      stars.push({
        x:  Math.random() * canvas.width,
        y:  Math.random() * canvas.height,
        r:  Math.random() * 1.5 + 0.3,
        a:  Math.random(),
        da: (Math.random() * 0.008 + 0.002) * (Math.random() < 0.5 ? 1 : -1),
      });
    }
  }
  function draw() {
    requestAnimationFrame(draw);
    if (document.hidden) return; // tab hidden hole kaj na kore, battery bache
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a += s.da;
      if (s.a <= 0 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a.toFixed(2)})`;
      ctx.fill();
    }
  }
  window.addEventListener('resize', resize);
  resize();
  draw();
})();

/* ── "R+F" particle love animation ───────────────────────── */
(function initRFParticles() {
  const canvas = document.getElementById('rf-canvas');
  const ctx    = canvas.getContext('2d');
  const colors = ['#ff2d6b', '#ff6b9d', '#ff9dbf', '#ffd0e0', '#ffffff'];
  let particles = [];
  let W = 0, H = 0;
  const mouse = { x: -9999, y: -9999 };

  function pick() { return colors[Math.floor(Math.random() * colors.length)]; }

  function buildTargets() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;

    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const o = off.getContext('2d');
    o.fillStyle = '#fff';
    o.textAlign = 'center';
    o.textBaseline = 'middle';

    let fs = Math.min(W * 0.34, H * 0.42);
    o.font = `700 ${fs}px Arial, sans-serif`;
    let tw = o.measureText(PARTICLE_TEXT).width;
    const maxW = W * 0.85;
    if (tw > maxW) { fs *= maxW / tw; o.font = `700 ${fs}px Arial, sans-serif`; }

    o.fillText(PARTICLE_TEXT, W / 2, H / 2);
    const data = o.getImageData(0, 0, W, H).data;

    const gap = Math.max(5, Math.round(fs / 42));
    const targets = [];
    for (let y = 0; y < H; y += gap) {
      for (let x = 0; x < W; x += gap) {
        if (data[(y * W + x) * 4 + 3] > 128) targets.push({ x, y });
      }
    }
    return targets;
  }

  function init() {
    const targets = buildTargets();
    particles = targets.map(t => ({
      x: Math.random() * W,
      y: Math.random() * H,
      tx: t.x, ty: t.y,
      vx: 0, vy: 0,
      size: 1.3 + Math.random() * 1.5,
      color: pick(),
    }));
  }

  function frame() {
    requestAnimationFrame(frame);
    if (document.hidden) return; // tab hidden hole pause, battery bache
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      // target er dike taan
      p.vx += (p.tx - p.x) * 0.013;
      p.vy += (p.ty - p.y) * 0.013;
      // mouse repel
      const mdx = p.x - mouse.x, mdy = p.y - mouse.y;
      const md  = mdx * mdx + mdy * mdy;
      if (md < 6400) {
        const d = Math.sqrt(md) || 1;
        const f = (6400 - md) / 6400;
        p.vx += (mdx / d) * f * 4;
        p.vy += (mdy / d) * f * 4;
      }
      p.vx *= 0.86; p.vy *= 0.86;
      p.x  += p.vx;  p.y  += p.vy;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size * 1.6, p.size * 1.6);
    }
  }

  window.addEventListener('pointermove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('pointerout', () => { mouse.x = -9999; mouse.y = -9999; });
  let rt;
  window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(init, 220); });

  init();
  frame();
})();

/* ── Cursor heart trail ──────────────────────────────────── */
(function initCursorTrail() {
  const hearts = ['❤️','💕','💖','💗'];
  let last = 0;
  function spawn(x, y) {
    const now = Date.now();
    if (now - last < 55) return;
    last = now;
    const h = document.createElement('div');
    h.className   = 'cursor-heart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left  = x + 'px';
    h.style.top   = y + 'px';
    h.style.fontSize = (10 + Math.random() * 8) + 'px';
    document.body.appendChild(h);
    h.addEventListener('animationend', () => h.remove());
  }
  window.addEventListener('pointermove', (e) => spawn(e.clientX, e.clientY));
})();

/* ── Repeat na kore message ana ──────────────────────────── */
function getNextMessage() {
  if (usedIndexes.length >= messages.length) usedIndexes = [];
  let idx;
  do { idx = Math.floor(Math.random() * messages.length); }
  while (usedIndexes.includes(idx));
  usedIndexes.push(idx);
  return messages[idx];
}

/* ── Random direction e message dekhano ──────────────────── */
function showPhrase() {
  const el = document.createElement('div');
  el.className   = 'phrase-bubble';
  el.textContent = getNextMessage();

  const heartRect     = heartBtn.getBoundingClientRect();
  const containerRect = phrasesContainer.getBoundingClientRect();
  const originX = heartRect.left + heartRect.width  / 2 - containerRect.left;
  const originY = heartRect.top  + heartRect.height / 2 - containerRect.top;

  el.style.left = originX + 'px';
  el.style.top  = originY + 'px';

  const angle = Math.random() * 360;
  const rad   = (angle * Math.PI) / 180;
  const dist  = 10 + Math.random() * 10;
  const tx    = Math.cos(rad) * dist;
  const ty    = Math.sin(rad) * dist - 30;
  const rot   = (Math.random() * 20 - 10).toFixed(1);
  const dur   = (2.8 + Math.random() * 0.8).toFixed(2);

  el.style.setProperty('--tx',  tx.toFixed(1) + 'px');
  el.style.setProperty('--ty',  ty.toFixed(1) + 'px');
  el.style.setProperty('--rot', rot + 'deg');
  el.style.setProperty('--dur', dur + 's');

  phrasesContainer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ── Heart particle burst ────────────────────────────────── */
function spawnParticles(x, y) {
  const emojis = ['❤️','💕','💖','✨','💗','🌸'];
  for (let i = 0; i < 6; i++) {
    const p     = document.createElement('div');
    p.className = 'heart-particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (i / 6) * 360;
    const dist  = 55 + Math.random() * 45;
    const rad   = (angle * Math.PI) / 180;
    p.style.cssText = `left:${x}px;top:${y}px;--dx:${(Math.cos(rad)*dist).toFixed(1)}px;--dy:${(Math.sin(rad)*dist-30).toFixed(1)}px`;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

/* ── Choto click sound (WebAudio) ────────────────────────── */
let audioCtx = null;
function playClickSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(990, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.26);
  } catch (e) { /* sound na holeo problem nai */ }
}

function openLetter() {
  letterBody.textContent = LOVE_LETTERS[letterIndex % LOVE_LETTERS.length];
  letterIndex++;
  letterOverlay.classList.add('show');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

/* ── Heart e click ───────────────────────────────────────── */
function handleHeartActivate() {
  const rect = heartBtn.getBoundingClientRect();
  const cx   = rect.left + rect.width  / 2;
  const cy   = rect.top  + rect.height / 2;

  if (!firstClick) {
    firstClick = true;
    clickHint.classList.add('hidden-hint');
    musicPlayer.classList.remove('hidden');
    if (audioEl.src) audioEl.play().catch(() => {}); // prothom click e gaan auto play
  }

  clickCount++;
  updateCounter();
  showPhrase();
  spawnParticles(cx, cy);
  playClickSound();

  // Milestone e surprise chithi
  if (clickCount === 10 || clickCount === 25 || clickCount === 50 || clickCount === 100) {
    setTimeout(openLetter, 450);
  }
}

heartBtn.addEventListener('click', handleHeartActivate);

// Accessibility: keyboard diye activate (Enter ba Space)
heartBtn.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    handleHeartActivate();
  }
});

(function initLongPress() {
  let timer = null;
  const start  = () => { timer = setTimeout(openLetter, 700); };
  const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
  heartBtn.addEventListener('pointerdown', start);
  heartBtn.addEventListener('pointerup', cancel);
  heartBtn.addEventListener('pointerleave', cancel);

/* ── Audio player ────────────────────────────────────────── */
function formatTime(sec) {
  if (isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

playBtn.addEventListener('click', () => {
  if (!audioEl.src) return;
  isPlaying ? audioEl.pause() : audioEl.play().catch(() => {});
});

audioEl.addEventListener('play', () => {
  isPlaying = true;
  playIcon.style.display  = 'none';
  pauseIcon.style.display = '';
});
audioEl.addEventListener('pause', () => {
  isPlaying = false;
  playIcon.style.display  = '';
  pauseIcon.style.display = 'none';
});
audioEl.addEventListener('ended', () => {
  isPlaying = false;
  playIcon.style.display    = '';
  pauseIcon.style.display   = 'none';
  progressFill.style.width  = '0%';
  currentTimeEl.textContent = '0:00';
});
audioEl.addEventListener('timeupdate', () => {
  if (!audioEl.duration) return;
  progressFill.style.width  = ((audioEl.currentTime / audioEl.duration) * 100) + '%';
  currentTimeEl.textContent = formatTime(audioEl.currentTime);
});
audioEl.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audioEl.duration);
});

// Error handle: local gaan na pele demo gaan e fallback
audioEl.addEventListener('error', () => {
  if (!usingDemo) {
    usingDemo = true;
    audioEl.src = DEMO_MUSIC_URL;
    audioEl.load();
    if (firstClick) audioEl.play().catch(() => {});
  } else {
    const titleEl = document.querySelector('.player-title');
    if (titleEl) titleEl.textContent = '⚠️ গান লোড করা যায়নি';
    totalTimeEl.textContent = '--:--';
  }
});

/* ── Progress bar seek (click + touch) ───────────────────── */
function seekFromClientX(clientX) {
  if (!audioEl.duration) return;
  const rect = progressBar.getBoundingClientRect();
  let ratio = (clientX - rect.left) / rect.width;
  ratio = Math.min(1, Math.max(0, ratio));
  audioEl.currentTime = ratio * audioEl.duration;
}
progressBar.addEventListener('click', (e) => seekFromClientX(e.clientX));
progressBar.addEventListener('touchstart', (e) => {
  if (e.touches[0]) seekFromClientX(e.touches[0].clientX);
}, { passive: true });
progressBar.addEventListener('touchmove', (e) => {
  if (e.touches[0]) seekFromClientX(e.touches[0].clientX);
}, { passive: true });

/* ── Background scroll bondho, control block na kore ─────── */
document.addEventListener('touchmove', (e) => {
  if (e.target.closest && e.target.closest('.music-player, .modal-overlay')) return;
  e.preventDefault();
}, { passive: false });
